- name: Alta de convidat
  action: user name=convidat create_home=no groups=cdrom,dialout,netdev append=yes shell=/bin/bash comment="Usuari convidat" password=""

- name: Copia /usr/local/bin/reset_guest.sh
  copy:
    src: files/reset_guest.sh
    dest: /usr/local/bin/reset_guest.sh
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx

- name: Configurar PAM para ejecutar el script de limpieza al inicio de sesión
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional pam_exec.so /usr/local/bin/reset_guest.sh"
    state: present
    insertafter: EOF
    # Esto asegura que la línea no se duplique si ya existe algo parecido
    regexp: '^session.*pam_exec.so.*/usr/local/bin/reset_guest.sh'

