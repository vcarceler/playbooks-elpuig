- name: Instala kvm y virt-manager
  apt:
    update_cache: yes
    pkg:
    - libguestfs-tools
    - ovmf
      #- qemu-kvm
    - virt-manager
    - qemu-system-x86
    - libvirt-daemon-system
    - libvirt-clients
    - bridge-utils
    - virtinst

- name: Activa la virtualización anidada para KVM
  lineinfile:
          path: /etc/modprobe.d/kvm.conf
          create: yes
          state: present
          line: 'options kvm_intel nested=1'
